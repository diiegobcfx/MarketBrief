<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketBrief</title>

<style>
body {
  background: #0a0a0f;
  color: #e8e8f0;
  font-family: -apple-system, sans-serif;
  padding: 20px;
  max-width: 500px;
  margin: auto;
}
button {
  width: 100%;
  padding: 15px;
  background: #00ff88;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
}
#result {
  margin-top: 20px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>MarketBrief</h2>

<div id="setup">
  <input type="password" id="key" placeholder="API Key (sk-...)" />
  <button onclick="saveKey()">Guardar</button>
</div>

<button onclick="generate()">Generar briefing</button>

<div id="result"></div>

<script>
function saveKey() {
  const key = document.getElementById("key").value.trim();
  if (!key.startsWith("sk-")) {
    alert("Key inválida");
    return;
  }
  localStorage.setItem("openai_key", key);
  alert("Guardada");
}

async function generate() {
  const key = localStorage.getItem("openai_key");
  if (!key) {
    alert("Introduce API key");
    return;
  }

  const now = new Date().toLocaleDateString("es-ES", {
    weekday: "long",
    day: "numeric",
    month: "long"
  });

  const prompt = `
Hoy es ${now}.

Genera un briefing de trading profesional.

Estructura:

📡 CONTEXTO
Resumen macro breve

⚡ SESIÓN
• Sentimiento
• Volatilidad
• Consejo claro

📰 NOTICIAS
5 noticias con impacto (ALTO/MEDIO/BAJO)

Usa activos: SPY, BTC, DXY, OIL, NASDAQ, EURUSD.

No inventes datos específicos si no estás seguro.
`;

  document.getElementById("result").textContent = "Cargando...";

  try {
    const res = await fetch("https://api.openai.com/v1/responses", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + key
      },
      body: JSON.stringify({
        model: "gpt-4.1-mini",
        max_output_tokens: 600,
        input: [
          {
            role: "system",
            content: "Eres un analista de trading profesional."
          },
          {
            role: "user",
            content: prompt
          }
        ]
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error?.message || "Error API");
    }

    const text = data.output[0].content[0].text;

    document.getElementById("result").textContent = text;

  } catch (err) {
    document.getElementById("result").textContent = "Error: " + err.message;
  }
}
</script>

</body>
</html>
