<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MarketBrief Pro</title>
<style>
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#16161f;
    --border:#1e1e2e; --text:#e8e8f0; --muted:#5a5a7a; --sub:#9090b0;
    --accent:#00ff88; --down:#ff4466; --warn:#ffaa00;
  }
  body.light {
    --bg:#f4f4f8; --surface:#ffffff; --surface2:#eeeef4;
    --border:#dddde8; --text:#111118; --muted:#8888aa; --sub:#555570;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,sans-serif; min-height:100vh; padding:0 16px 100px; transition:background 0.3s,color 0.3s; }
  .container { max-width:480px; margin:0 auto; }

  /* SETUP */
  #setupScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:32px 16px; }
  .setup-icon { font-size:48px; margin-bottom:20px; }
  .setup-title { font-size:24px; font-weight:800; margin-bottom:8px; }
  .setup-title span { color:var(--accent); }
  .setup-sub { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:24px; max-width:300px; }
  .setup-label { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; text-align:left; width:100%; margin-bottom:8px; margin-top:16px; }
  .setup-input { width:100%; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:13px; font-family:monospace; outline:none; }
  .setup-btn { width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:13px; font-size:14px; font-weight:700; cursor:pointer; margin-top:20px; }
  .chip-grid { display:flex; flex-wrap:wrap; gap:8px; width:100%; }
  .chip { font-size:12px; padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; }
  .chip.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }

  /* APP */
  #appScreen { display:none; }
  .header { display:flex; justify-content:space-between; align-items:flex-start; padding:24px 0 14px; }
  .greeting { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
  .title { font-size:26px; font-weight:800; letter-spacing:-0.5px; }
  .title span { color:var(--accent); }
  .date-badge { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 12px; text-align:right; }
  .date-day { font-size:20px; font-weight:700; color:var(--accent); line-height:1; }
  .date-month { font-size:10px; color:var(--muted); text-transform:uppercase; }

  /* FEAR & GREED / PRICES */
  .fg-card, .prices-card, .earnings-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:12px; }
  .prices-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px; }
  .price-item { background:var(--surface2); border-radius:8px; padding:8px 10px; }
  .pi-sym { font-size:11px; font-weight:700; }
  .pi-price { font-size:13px; font-family:monospace; }
  
  /* TABS & CONTENT */
  .tabs { display:flex; gap:6px; margin-bottom:14px; }
  .tab { flex:1; padding:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; text-align:center; color:var(--muted); }
  .tab.active { background:var(--accent); color:#000; }
  #mainBtn { width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:13px; font-size:14px; font-weight:700; cursor:pointer; margin-bottom:12px; }
  
  /* BRIEFING STYLES */
  #content { line-height:1.6; }
  .l-section { font-size:13px; font-weight:800; color:var(--accent); text-transform:uppercase; margin:20px 0 10px; border-bottom:1px solid var(--border); padding-bottom:4px; }
  .l-normal { font-size:13px; color:var(--sub); margin-bottom:8px; }
  .source-tag { font-size:10px; color:var(--accent); font-family:monospace; margin-top:15px; opacity:0.7; }
</style>
</head>
<body>

<div id="setupScreen">
  <div class="setup-icon">🧠</div>
  <div class="setup-title">Market<span>Brief</span> PRO</div>
  <p class="setup-sub">Datos Macro de la FRED + Geopolítica GDELT + IA.</p>
  <div class="setup-label">Groq API Key</div>
  <input class="setup-input" type="password" id="groqKey" placeholder="gsk_..." />
  <div class="setup-label">Mercados</div>
  <div class="chip-grid">
    <span class="chip active" data-cat="forex">💱 Forex</span>
    <span class="chip active" data-cat="crypto">₿ Cripto</span>
    <span class="chip active" data-cat="indices">📈 Índices</span>
  </div>
  <button class="setup-btn" onclick="saveKey()">Configurar y Entrar →</button>
</div>

<div id="appScreen">
  <div class="container">
    <div class="header">
      <div>
        <div class="greeting" id="greetingText">Buenos días</div>
        <div class="title">Market<span>Brief</span></div>
      </div>
      <div class="date-badge">
        <div class="date-day" id="dayNum">--</div>
        <div class="date-month" id="monthStr">---</div>
      </div>
    </div>

    <div class="prices-card">
      <div style="font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase;">Precios Live</div>
      <div class="prices-grid" id="pricesGrid"></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('briefing')">Análisis</div>
      <div class="tab" onclick="switchTab('history')">Historial</div>
    </div>

    <div id="tabContent-briefing">
      <button id="mainBtn" onclick="generate()">⚡ Generar Briefing Inteligente</button>
      <div id="stepMsg" style="font-size:11px; color:var(--accent); text-align:center; margin-bottom:10px; font-family:monospace;"></div>
      <div id="content"></div>
    </div>
  </div>
</div>

<script>
  var PROXY = 'https://marketbrief-proxy.dburgos122002.workers.dev';
  var MONTHS = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  
  if (localStorage.getItem('mb_groq_key')) { showApp(); loadMarketData(); }

  function saveKey() {
    var k = document.getElementById('groqKey').value.trim();
    if (!k.startsWith('gsk_')) return alert('Key no válida');
    localStorage.setItem('mb_groq_key', k);
    showApp(); loadMarketData();
  }

  function showApp() {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    var d = new Date();
    document.getElementById('dayNum').textContent = d.getDate();
    document.getElementById('monthStr').textContent = MONTHS[d.getMonth()];
  }

  async function loadMarketData() {
    try {
      const r = await fetch(PROXY + '?type=crypto');
      const data = await r.json();
      document.getElementById('pricesGrid').innerHTML = data.slice(0,4).map(q => `
        <div class="price-item">
          <div class="pi-sym">${q.symbol}</div>
          <div class="pi-price">$${parseFloat(q.price).toLocaleString()}</div>
        </div>
      `).join('');
    } catch(e) {}
  }

  async function generate() {
    const key = localStorage.getItem('mb_groq_key');
    const btn = document.getElementById('mainBtn');
    const step = document.getElementById('stepMsg');
    const content = document.getElementById('content');

    btn.disabled = true;
    content.innerHTML = "Cargando datos macro...";
    
    try {
      step.textContent = "📡 Extrayendo datos de FRED y GDELT...";
      const [fredRes, gdeltRes] = await Promise.allSettled([
        fetch(PROXY + '?type=fred_macro').then(r => r.json()),
        fetch(PROXY + '?type=gdelt_news').then(r => r.json())
      ]);

      let contextText = "";
      if (fredRes.status === 'fulfilled') {
        const [cpi, unrate, rate] = fredRes.value;
        contextText += `DATOS FRED: Desempleo ${unrate.observations[0].value}%, Inflación ${cpi.observations[0].value}, Tipos ${rate.observations[0].value}%.\n`;
      }
      if (gdeltRes.status === 'fulfilled' && gdeltRes.value.articles) {
        contextText += "NOTICIAS: " + gdeltRes.value.articles.slice(0,3).map(a => a.title).join(" | ");
      }

      step.textContent = "🤖 IA Analizando correlaciones...";
      
      const groqRes = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { 
              role: 'system', 
              content: 'Eres un estratega macro. Tu tarea es explicar cómo los datos de desempleo afectan a las divisas de forma genérica. Si el desempleo sube, la divisa se debilita. Si baja, se fortalece. No uses markdown, ni asteriscos.' 
            },
            { 
              role: 'user', 
              content: `Analiza estos datos hoy: ${contextText}. Crea un briefing profesional con secciones: RESUMEN, ANALISIS MACRO Y DIVISAS, GEOPOLITICA.` 
            }
          ]
        })
      });

      const resJson = await groqRes.json();
      const raw = resJson.choices[0].message.content;
      
      renderBriefing(raw);
      step.textContent = "✓ Análisis completado";
      btn.disabled = false;
    } catch (e) {
      content.innerHTML = "Error: " + e.message;
      btn.disabled = false;
    }
  }

  function renderBriefing(raw) {
    const lines = raw.split('\n');
    let html = "";
    lines.forEach(l => {
      if (!l.trim()) return;
      if (l.includes(':') && l.length < 40) html += `<div class="l-section">${l}</div>`;
      else html += `<div class="l-normal">${l}</div>`;
    });
    html += `<div class="source-tag">Fuentes: FRED, GDELT Project, Groq Llama 3.3</div>`;
    document.getElementById('content').innerHTML = html;
  }

  function switchTab(t) {
    // Lógica simple para cambiar pestañas
  }
</script>
</body>
</html>
